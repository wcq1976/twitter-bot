name: Auto Tweet

on:
  schedule:
    - cron: '30 23,4,10 * * *'
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests requests-toolbelt
        
      - name: Post tweets
        env:
          AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          CT0: ${{ secrets.TWITTER_CT0 }}
        run: python tweet_action.py
